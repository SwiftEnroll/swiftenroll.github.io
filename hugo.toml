title = "SwiftEnroll"
baseURL = "https://swiftenroll.github.io/"

# Enable emoji support
enableEmoji = true

# Enable Git info for lastmod
enableGitInfo = true

# Sitemap configuration
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"

[caches]
    [caches.images]
        dir = ":cacheDir/images"
        maxAge = "8760h"  # 1 year

[params]
  description = "SwiftEnroll simplifies enrollment, waitlists, approvals, and payments for camps, after-school programs, and youth organizations."
  author = "SwiftEnroll"
  logo = "/images/logo.png"
  # Default social preview image for OpenGraph and Twitter cards
  image = "/images/hero-image.png"
  # Twitter handle (without @)
  twitter = "SwiftEnroll"
  # Google Analytics ID (GA4)
  googleAnalytics = "G-412XPZYPQM"
  
  # Form Configuration
  [params.forms]
    # Cloudflare Turnstile site key for anti-spam protection
    turnstileSiteKey = "0x4AAAAAAB--JQpodZqe67sc"
    
    # Honeypot field name (hidden field to catch bots)
    honeypotFieldName = "_gotcha"
    
    # Form endpoints - use environment variable overrides for local dev
    # Set HUGO_PARAMS_FORMS_CONTACTENDPOINT="" in local .env to disable real submissions
    contactEndpoint = "https://submit-form.com/9cR1q3cWi"
    demoEndpoint = "https://submit-form.com/InyGZDbvs"
    subscribeEndpoint = "https://submit-form.com/subscribe"
  
  # Company (About) Page Content
  [params.company]
    [params.company.hero]
      title = "About SwiftEnroll"
      subtitle = "We help camps, after‑school programs, and youth organizations run enrollment, waitlists, and payments - simply."
      mission_title = "Our mission"
      mission_text = "SwiftEnroll removes enrollment headaches with fast, transparent sign-ups and reliable waitlists, approvals, rosters, and payments - together in one platform."
    # Our Story section
    [params.company.story]
      title = "Our Story"
      content = """
**Founded by parents who've been there.**

Like many parents, our founder spent too many hours juggling enrollment forms, waiting for email confirmations, and wondering if their child would get off the waitlist. When his family faced the chaos of camp registration season - hitting 'refresh' on websites, calling during office hours only to reach voicemail, and navigating confusing payment processes - he knew there had to be a better way.

**We actually answer the phone.**

SwiftEnroll was born from real frustration with real enrollment systems. We're a small team, but that's our strength. When you call us, you talk to real people who understand your challenges because we've lived them. We're not a faceless corporation - we're parents, program directors, and tech builders who care deeply about making enrollment work for everyone.

**Built for people, not just processes.**

Every feature we build starts with a simple question: "Would this make life easier for a busy parent or a stressed program director?" We believe enrollment should be transparent, fair, and stress-free. That's why we created clear waitlist systems, fair placement processes, and straightforward payment options - all designed to build trust between programs and the families they serve.
"""
    team_title = "Leadership"
    values_title = "What we stand for"
    # Team members (finalized)
    [[params.company.team]]
      name = "Joe Cronyn"
      title = "Founder & Chief Executive Officer"
      image = "/images/company/headshot.png"
      linkedin = "https://www.linkedin.com/in/joecronyn/"
    # Values
    [[params.company.values]]
      title = "Customer-first design"
      icon = "users"
      description = "We design for customers first - clear flows, fewer steps, and accessible choices."
    [[params.company.values]]
      title = "Simplicity over complexity"
      icon = "lightbulb"
      description = "Operational tools should feel effortless. We cut clutter so admins move faster."
    [[params.company.values]]
      title = "Transparency & trust"
      icon = "eye"
      description = "Fair lotteries, honest waitlists, and clear communication build confidence."
    # Stats (conservative, non‑marketing claims; safe placeholders)
    [[params.company.stats]]
      number = "2025"
      label = "Founded"
    [[params.company.stats]]
      number = "$0"
      label = "Funding"
    [[params.company.stats]]
      number = "6"
      label = "Focus industries"
    [[params.company.stats]]
      number = "150+"
      label = "Users served"
  
  # Global CTA Configuration
  [params.cta]
    enable = true
    title = "Simplify enrollment management"
    description = "SwiftEnroll helps programs manage classes, waitlists, approvals, and payments with ease."
    gradient_from = "#1F1C4E"  # SwiftEnroll Primary
    gradient_to = "#2E3058"    # SwiftEnroll Secondary
    gradient_angle = 30
    [params.cta.primary_button]
      text = "Book a Demo"
      url = "/demo/"
  
  # Social Media Links
  [params.social]
    linkedin = "https://linkedin.com/company/swiftenroll/"
    twitter = "https://x.com/SwiftEnroll"

  # Footer Configuration
  [params.footer]
    column_1_title = "Industries"
    column_2_title = "By Feature"
    column_3_title = "Company"
    column_4_title = "Legal"
  
  [params.header]
    # Header background and border styles (optional)
    background = "bg-white/80 backdrop-blur-sm"
    border = "border-b border-gray-100"
    
    # Logo configuration
    [params.header.logo]
      src = "/images/logo.png"
    
    # Menu configuration
    [params.header.menu]
      spacing = "space-x-8"
      
      # Dropdown menu configuration
      [params.header.menu.dropdown]
        width = "w-72"
        container_padding = "py-6"
        item_padding = "px-8 py-3"
        background = "bg-white"
        border = "border border-gray-100"
        shadow = "shadow-xl"
        radius = "rounded-lg"
        text_color = "text-gray-700"
        hover_background = "hover:bg-gray-50"
        text_size = "text-sm"
    
    # Button configuration
    [params.header.buttons]
      # Get Started button
      [params.header.buttons.getStarted]
        text = "Book a Demo"
        url = "/demo/"
  
  # Centralized copy
  [params.text]
    trustedByCompanies = "Proudly supporting community enrichment programs"
    testimonialsTitle = "What they're saying"
    testimonialsDescription = "Real user feedback from parents and administrators."
    seeItInAction = "See it in action"
    perMonth = "/mo"
  
  # Image optimization configuration
  [params.images]
    # Default responsive image widths for srcset generation
    # Images will be generated at these widths (if original is large enough)
    responsiveWidths = [480, 768, 1024, 1440]
    
    # Default sizes attribute for responsive images
    # Format: "(min-width: breakpoint) size, fallback"
    defaultSizes = "(min-width: 1280px) 1280px, 100vw"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.80.0"

[build]
  writeStats = true

[build.buildStats]
  enable = true

[security.funcs]
  getenv = ['^HUGO_', '^CI$']

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
    guessSyntax = true
    lineNumbersInTable = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

