title: "Simple pricing for programs and schools"
description: "Plans for non-profit programs, for-profit businesses, and larger enterprises.&lt;br/&gt;All plans include secure payments, waitlists, approvals, and parent-friendly enrollment."
plans:
  - name: "Non-Profit"
    price: "0"
    description: "Discounted pricing for 501(c)(3) and public institutions."
    structured_description: "Enrollment management platform for 501(c)(3) and public institutions. Includes unlimited programs, waitlists, placement, approvals, notifications, Stripe payments, basic reporting, and email support."
