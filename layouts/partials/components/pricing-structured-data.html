{{- /* Pricing structured data — Product + Offer for each plan */ -}}
{{- with site.Data.pricing.plans }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {{- range $i, $plan := . -}}
    {{- if $i }},{{ end }}
    {
      "@type": "Product",
      "name": "SwiftEnroll {{ $plan.name }} Plan",
      "description": "{{ $plan.structured_description }}",
      "brand": {
        "@type": "Organization",
        "name": "SwiftEnroll"
      },
      "offers": {
        "@type": "Offer",
        {{- if and $plan.price (ne (lower $plan.price) "custom") }}
        "price": "{{ $plan.price }}",
        "priceCurrency": "USD",
        "priceValidUntil": "{{ now.AddDate 1 0 0 | time.Format "2006-01-02" }}",
        {{- end }}
        "availability": "https://schema.org/InStock",
        "url": "{{ "pricing/" | absURL }}"
      }
    }
    {{- end }}
  ]
}
</script>
{{- end -}}
