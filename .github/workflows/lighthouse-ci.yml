name: Lighthouse CI
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: swiftenroll-lab
    env:
      DART_SASS_VERSION: 1.97.3
      GO_VERSION: 1.25.7
      HUGO_VERSION: 0.155.3
      NODE_VERSION: 25.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Create directory for user-specific executable files
        run: |
          mkdir -p "${HOME}/.local"

      - name: Cache Dart Sass
        id: sass-cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.local/dart-sass
          key: dart-sass-${{ env.DART_SASS_VERSION }}
      - name: Install Dart Sass
        if: steps.sass-cache.outputs.cache-hit != 'true'
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
      - name: Add Dart Sass to PATH
        run: echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      - name: Cache Hugo binary
        id: hugo-cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.local/hugo
          key: hugo-${{ env.HUGO_VERSION }}
      - name: Install Hugo
        if: steps.hugo-cache.outputs.cache-hit != 'true'
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
      - name: Add Hugo to PATH
        run: echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

      - name: Build the site
        run: |
          hugo --gc --minify
        env:
          # Disable Turnstile during Lighthouse CI to avoid console errors
          # Turnstile cannot validate in CI environment and causes best-practices score to drop
          HUGO_PARAMS_FORMS_TURNSTILESITEKEY: ""

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.15.x

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
